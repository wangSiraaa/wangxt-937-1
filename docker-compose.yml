services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/events"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  app-data:
  app-uploads:
